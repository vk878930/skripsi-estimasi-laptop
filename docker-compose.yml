version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skripsi_laptop
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "8000:8000"
    environment:
      - DB_URI=postgresql://postgres:postgres@db:5432/skripsi_laptop
    depends_on:
      db:
        condition: service_healthy

  backend-service:
    build:
      context: ./backend-service
    ports:
      - "8080:8080"
    environment:
      - DB_DSN=host=db user=postgres password=postgres dbname=skripsi_laptop port=5432 sslmode=disable
      - PYTHON_ML_URL=http://ml-service:8000/predict
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started

  frontend-web:
    build:
      context: ./frontend-web
    ports:
      - "5173:5173"
    depends_on:
      - backend-service

volumes:
  pgdata:
